version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cf_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cfbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-confluence_chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cf_network

  redis:
    image: redis:7-alpine
    container_name: cf_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cf_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cf_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cfbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-confluence_chatbot}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_CHAT_DEPLOYMENT=${AZURE_CHAT_DEPLOYMENT:-gpt-5.1}
      - AZURE_EMBEDDING_DEPLOYMENT=${AZURE_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://cf.rocktor.shop}
      - CONFLUENCE_BASE_URL=${CONFLUENCE_BASE_URL}
    volumes:
      - ./backend:/app
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cf_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cf_frontend
    ports:
      - "3200:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://cf.rocktor.shop/api}
      - VITE_WS_URL=${VITE_WS_URL:-wss://cf.rocktor.shop/api/chat/ws}
    networks:
      - cf_network

  nginx:
    image: nginx:alpine
    container_name: cf_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - cf_network

volumes:
  postgres_data:
  redis_data:
  frontend_build:

networks:
  cf_network:
    driver: bridge
